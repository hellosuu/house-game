<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거주 권리 및 태도 진단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden fade-in">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold">🏠 집 거주 권리 진단</h1>
            <p class="text-sm opacity-80 mt-1">나의 거주 상태와 태도를 점검해봅시다</p>
        </div>

        <!-- Content -->
        <div id="content" class="p-8">
            <div id="question-area" class="space-y-6">
                <div id="question-text" class="text-lg font-medium text-gray-800 leading-relaxed min-h-[80px]">
                    게임을 시작하려면 아래 버튼을 눌러주세요.
                </div>
                
                <div id="options" class="flex flex-col gap-3">
                    <button onclick="startGame()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all active:scale-95">
                        진단 시작하기
                    </button>
                </div>
            </div>

            <!-- Result Area (Hidden by default) -->
            <div id="result-area" class="hidden text-center space-y-6">
                <div class="inline-block p-4 bg-indigo-50 rounded-full">
                    <span id="result-emoji" class="text-5xl">💡</span>
                </div>
                <h2 id="result-title" class="text-2xl font-bold text-gray-900">결과 타이틀</h2>
                <div id="result-desc" class="text-gray-600 leading-relaxed whitespace-pre-wrap">
                    결과 설명이 표시됩니다.
                </div>
                <button onclick="resetGame()" class="w-full py-3 border-2 border-gray-200 text-gray-500 rounded-xl font-bold hover:bg-gray-50 transition-all">
                    다시 하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const nodes = {
            start: {
                text: "Q1. 이 집은 당신 명의의 집입니까? (본인이 직접 매매 혹은 전세계약을 하였습니까?)",
                options: [
                    { label: "Yes", next: "q_independent" },
                    { label: "No", next: "q_contribution" }
                ]
            },
            q_independent: {
                text: "본인의 명의라면 가구주로서의 책임감을 느끼고 계신가요?",
                options: [
                    { label: "Yes", next: "a_king" },
                    { label: "No", next: "a_warning" }
                ]
            },
            q_contribution: {
                text: "Q2. 당신은 이 집에 살면서 실질적인 물질적 기여(생활비, 공과금 분담 등)를 하고 있습니까?",
                options: [
                    { label: "Yes", next: "a_roommate" },
                    { label: "No", next: "a_parasite" }
                ]
            }
        };

        const results = {
            a_king: {
                emoji: "👑",
                title: "진정한 집주인",
                desc: "당신은 이 집의 주인입니다. 본인의 공간을 가꾸고 유지하는 데 자부심을 가지세요. 당신의 규칙이 곧 법입니다."
            },
            a_warning: {
                emoji: "⚠️",
                title: "책임감 부족",
                desc: "본인 명의의 집임에도 관리 의지가 부족하시군요. 집은 가만히 놔두면 망가집니다. 주인 의식을 더 가지세요!"
            },
            a_roommate: {
                emoji: "🤝",
                title: "당당한 공동체 구성원",
                desc: "비록 명의자는 아닐지라도 경제적 기여를 통해 1인분의 몫을 하고 계시는군요. 상호 존중하며 생활하세요."
            },
            a_parasite: {
                emoji: "🙏",
                title: "무상 거주 감사 타입",
                desc: "무료로 얹혀살 수 있다는 것은 큰 축복입니다. 집의 주인(주로 부모님)에게 무한한 감사를 표하며, 가사노동 보조 및 순종적인 태도를 유지하십시오."
            }
        };

        let currentNode = null;

        function startGame() {
            renderNode('start');
        }

        function renderNode(nodeKey) {
            currentNode = nodes[nodeKey];
            const questionText = document.getElementById('question-text');
            const optionsArea = document.getElementById('options');

            questionText.classList.remove('fade-in');
            void questionText.offsetWidth; // Trigger reflow
            questionText.classList.add('fade-in');

            questionText.innerText = currentNode.text;
            optionsArea.innerHTML = '';

            currentNode.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 bg-white border-2 border-indigo-100 text-indigo-700 rounded-xl font-bold hover:bg-indigo-50 hover:border-indigo-300 transition-all active:scale-95 mb-2";
                btn.innerText = opt.label;
                btn.onclick = () => {
                    if (nodes[opt.next]) {
                        renderNode(opt.next);
                    } else {
                        showResult(opt.next);
                    }
                };
                optionsArea.appendChild(btn);
            });
        }

        function showResult(resultKey) {
            const result = results[resultKey];
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('fade-in');

            document.getElementById('result-emoji').innerText = result.emoji;
            document.getElementById('result-title').innerText = result.title;
            document.getElementById('result-desc').innerText = result.desc;
        }

        function resetGame() {
            document.getElementById('question-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');
            startGame();
        }
    </script>
</body>
</html>
